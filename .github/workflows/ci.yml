# CI does not run on its own from pushes or pull requests.
# It is invoked as a dependency by the Release and Pages workflows
# (via `workflow_call`) and can also be launched manually from the
# Actions tab if you want to sanity-check a branch without triggering a
# release or a deploy.

name: CI

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build:web
