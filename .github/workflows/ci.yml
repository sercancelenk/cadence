# Triggered automatically on PRs and pushes to `main`, AND callable from
# other workflows (Pages, Release) via `workflow_call` so they can gate
# their work on a green CI before doing anything expensive.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build:web
