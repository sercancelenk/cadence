# Manual-only PWA deploy. Push to `main` no longer auto-publishes;
# trigger from the Actions tab → "Run workflow" when you actually want
# the mobile site updated. The job calls the reusable CI workflow
# first and only continues when it goes green.

name: Deploy PWA to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build PWA bundle
    needs: ci
    runs-on: ubuntu-latest
    # The PWA bundle is pure web output — we don't ship Electron to Pages,
    # so we don't need (and can't reliably download on Ubuntu CI) the
    # Electron platform binary that the npm postinstall would otherwise pull.
    # Skipping it dodges the recurring "socket hang up" failures on the
    # github.com/electron CDN. See ci.yml for the same trick.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      NPM_CONFIG_FETCH_RETRIES: '5'
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '20000'
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'
      NPM_CONFIG_FETCH_TIMEOUT: '600000'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (no electron binary)
        run: npm ci --no-audit --no-fund

      - name: Build PWA
        run: npm run build:pwa
        env:
          LEEADMAN_BASE: /${{ github.event.repository.name }}/

      # GitHub Pages serves the deploy folder as-is at /<repo>/. The user must
      # visit that URL to land in the SPA, so a 404.html copy lets HashRouter
      # deep-links (e.g. /<repo>/#/todos) survive a hard refresh.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
