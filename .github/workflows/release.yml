# Manual-only desktop release. Trigger from the Actions tab → "Run workflow"
# when you want a new signed/notarized build. Steps:
#   1. Release CI gate (typecheck + unit tests + web build + E2E smoke).
#      Skips only coverage (duplicate test run) and PWA (not shipped in desktop).
#   2. Auto-bump version to 0.3.<run_number> (per-workflow counter).
#   3. macOS + Windows in parallel: package, sign, publish to GitHub Release.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      profile: release

  mac:
    needs: ci
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Publish hedefini repo sahibiyle eşle
        run: node scripts/patch-publish.mjs "${{ github.repository_owner }}"

      - name: Otomatik sürüm numarası
        run: npm pkg set version=0.3.${{ github.run_number }}

      # Skip `npm ci` when node_modules for this exact lockfile is cached.
      # The cached tree includes the extracted Electron binary (in
      # node_modules/electron/dist), and the `runner.os` key segment keeps
      # the macOS and Windows trees separate. `npm pkg set version` above
      # only edits package.json, not package-lock.json, so the cache key is
      # stable release-to-release until a dependency actually changes.
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Validate release config and helper
        run: |
          node scripts/validate-release-config.mjs
          npm run build:reminder-helper
          node scripts/validate-release-config.mjs --check-helper
        env:
          CADENCE_UNIVERSAL_HELPER: '1'

      - name: Derle ve GitHub Release oluştur (macOS)
        run: npm run build:web && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  win:
    needs: ci
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Publish hedefini repo sahibiyle eşle
        run: node scripts/patch-publish.mjs "${{ github.repository_owner }}"

      - name: Otomatik sürüm numarası
        run: npm pkg set version=0.3.${{ github.run_number }}

      # Skip `npm ci` when node_modules for this exact lockfile is cached.
      # The cached tree includes the extracted Electron binary (in
      # node_modules/electron/dist), and the `runner.os` key segment keeps
      # the macOS and Windows trees separate. `npm pkg set version` above
      # only edits package.json, not package-lock.json, so the cache key is
      # stable release-to-release until a dependency actually changes.
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'
          # No packages.lock.json — helper csproj has no NuGet deps; cache would fail the job.

      - name: Validate release config and helper
        run: |
          node scripts/validate-release-config.mjs
          npm run build:reminder-helper-win
          node scripts/validate-release-config.mjs --check-helper

      - name: Derle ve GitHub Release oluştur (Windows)
        run: npm run build:web && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
