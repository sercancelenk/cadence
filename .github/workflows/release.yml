# Manual-only macOS release. Trigger from the Actions tab → "Run workflow"
# when you want a new signed/notarized build. Steps:
#   1. Reusable CI gate (typecheck + web build).
#   2. Auto-bump version to 0.2.<run_number> (per-workflow counter).
#   3. electron-builder signs + notarizes + publishes the GitHub Release.
# Repo prerequisites: Settings → Actions → "Read and write" workflow
# permissions, and the Apple secrets listed below.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  mac:
    needs: ci
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Publish hedefini repo sahibiyle eşle
        run: node scripts/patch-publish.mjs "${{ github.repository_owner }}"

      - name: Otomatik sürüm numarası
        run: npm pkg set version=0.2.${{ github.run_number }}

      - run: npm ci

      - name: Derle ve GitHub Release oluştur
        run: npm run build:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
