# Manual-only desktop release. Trigger from the Actions tab → "Run workflow"
# when you want a new signed/notarized build. Steps:
#   1. Release CI gate (typecheck + unit tests + web build + E2E smoke).
#      Skips only coverage (duplicate test run) and PWA (not shipped in desktop).
#   2. Auto-bump version to 0.2.<run_number> (per-workflow counter).
#   3. macOS + Windows in parallel: package, sign, publish to GitHub Release.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      profile: release

  mac:
    needs: ci
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Publish hedefini repo sahibiyle eşle
        run: node scripts/patch-publish.mjs "${{ github.repository_owner }}"

      - name: Otomatik sürüm numarası
        run: npm pkg set version=0.2.${{ github.run_number }}

      - run: npm ci --no-audit --no-fund

      - name: Validate release config and helper
        run: |
          node scripts/validate-release-config.mjs
          npm run build:reminder-helper
          node scripts/validate-release-config.mjs --check-helper
        env:
          CADENCE_UNIVERSAL_HELPER: '1'

      - name: Derle ve GitHub Release oluştur (macOS)
        run: npm run build:web && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  win:
    needs: ci
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Publish hedefini repo sahibiyle eşle
        run: node scripts/patch-publish.mjs "${{ github.repository_owner }}"

      - name: Otomatik sürüm numarası
        run: npm pkg set version=0.2.${{ github.run_number }}

      - run: npm ci --no-audit --no-fund

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
          cache: true

      - name: Validate release config and helper
        run: |
          node scripts/validate-release-config.mjs
          npm run build:reminder-helper-win
          node scripts/validate-release-config.mjs --check-helper

      - name: Derle ve GitHub Release oluştur (Windows)
        run: npm run build:web && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
