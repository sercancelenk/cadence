# Manual-only deploy of the marketing landing + the PWA to GitHub Pages.
# Push to `main` no longer auto-publishes; trigger from the Actions tab →
# "Run workflow" when you actually want the public site refreshed. The job
# calls the reusable CI workflow first and only continues when it goes
# green.
#
# Site layout once published:
#   /cadence/        → static marketing landing
#   /cadence/app/    → the React PWA (was at /cadence/ in earlier versions)

name: Deploy site to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build landing + PWA
    needs: ci
    runs-on: ubuntu-latest
    # The PWA bundle is pure web output — we don't ship Electron to Pages,
    # so we don't need (and can't reliably download on Ubuntu CI) the
    # Electron platform binary that the npm postinstall would otherwise pull.
    # Skipping it dodges the recurring "socket hang up" failures on the
    # github.com/electron CDN. See ci.yml for the same trick.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      NPM_CONFIG_FETCH_RETRIES: '5'
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '20000'
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'
      NPM_CONFIG_FETCH_TIMEOUT: '600000'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (no electron binary)
        run: npm ci --no-audit --no-fund

      # Compiles the PWA into dist/app/ (vite.config picks `dist/app` when
      # CADENCE_PWA=1) and the marketing landing into dist/ root, with
      # shared brand assets + screenshots copied alongside. Also writes
      # dist/app/404.html so PWA deep-link refreshes survive Pages routing.
      - name: Assemble landing + PWA
        run: npm run build:pages
        env:
          CADENCE_BASE: /${{ github.event.repository.name }}/app/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
